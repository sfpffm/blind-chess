<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>Blind Chess</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>BLIND CHESS</h1>
    </header>

    <div id="status" class="status">Weiss am Zug</div>

    <div id="moveList" class="move-list">
      <div class="empty-state">
        <div>Dein Zug, Weiss.</div>
        <div class="hint">z.B. e4, Nf3, e2-e4</div>
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div id="boardOverlay" class="board-overlay hidden">
      <div class="board-container">
        <canvas id="boardCanvas" width="320" height="320"></canvas>
        <button class="btn board-close-btn" id="closeBoardBtn">Schliessen</button>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <input type="text" id="moveInput" placeholder="z.B. e4, Nf3, O-O"
               autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false">
        <button class="btn" id="submitBtn">OK</button>
      </div>
      <div class="controls">
        <button class="btn" id="undoBtn">Zurueck</button>
        <button class="btn" id="showBoardBtn">Brett</button>
        <button class="btn" id="newGameBtn">Neues Spiel</button>
      </div>
    </div>
  </div>

  <script src="js/chess.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
