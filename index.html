<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>Blind Chess</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>BLIND CHESS</h1>
    </header>

    <div id="status" class="status">Weiss am Zug</div>

    <div id="moveList" class="move-list">
      <div class="empty-state">
        <div>Dein Zug, Weiss.</div>
        <div class="hint">z.B. e4, Nf3, e2-e4</div>
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div id="boardOverlay" class="board-overlay hidden">
      <div class="board-container">
        <canvas id="boardCanvas" width="320" height="320"></canvas>
        <button class="btn board-close-btn" id="closeBoardBtn">Schliessen</button>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <input type="text" id="moveInput" placeholder="z.B. e4, Nf3, O-O"
               autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" readonly>
        <button class="btn" id="submitBtn">OK</button>
      </div>

      <!-- Chess keyboard for easy iPhone input -->
      <div id="chessKeyboard" class="chess-keyboard">
        <div class="kb-row">
          <button class="kb-key file-key" data-val="a">a</button>
          <button class="kb-key file-key" data-val="b">b</button>
          <button class="kb-key file-key" data-val="c">c</button>
          <button class="kb-key file-key" data-val="d">d</button>
          <button class="kb-key file-key" data-val="e">e</button>
          <button class="kb-key file-key" data-val="f">f</button>
          <button class="kb-key file-key" data-val="g">g</button>
          <button class="kb-key file-key" data-val="h">h</button>
        </div>
        <div class="kb-row">
          <button class="kb-key rank-key" data-val="1">1</button>
          <button class="kb-key rank-key" data-val="2">2</button>
          <button class="kb-key rank-key" data-val="3">3</button>
          <button class="kb-key rank-key" data-val="4">4</button>
          <button class="kb-key rank-key" data-val="5">5</button>
          <button class="kb-key rank-key" data-val="6">6</button>
          <button class="kb-key rank-key" data-val="7">7</button>
          <button class="kb-key rank-key" data-val="8">8</button>
        </div>
        <div class="kb-row">
          <button class="kb-key piece-key" data-val="K">K</button>
          <button class="kb-key piece-key" data-val="D">D</button>
          <button class="kb-key piece-key" data-val="T">T</button>
          <button class="kb-key piece-key" data-val="L">L</button>
          <button class="kb-key piece-key" data-val="S">S</button>
          <button class="kb-key piece-key" data-val="x">x</button>
          <button class="kb-key special-key" data-val="O-O">0-0</button>
          <button class="kb-key del-key" data-val="DEL">&#9003;</button>
        </div>
      </div>

      <div class="controls">
        <button class="btn" id="undoBtn">Zurueck</button>
        <button class="btn" id="showBoardBtn">Brett</button>
        <button class="btn" id="newGameBtn">Neues Spiel</button>
      </div>
    </div>
  </div>

  <script src="js/chess.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
